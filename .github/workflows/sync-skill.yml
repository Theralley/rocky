name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/rocky/SKILL.md
      - skills/rockycrew/SKILL.md
      - agents/rockycrew-*.md
      - skills/rocky-compress/SKILL.md
      - skills/rocky-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/rocky/SKILL.md plugins/rocky/skills/rocky/SKILL.md

      - name: Sync rocky-compress skill to plugin
        run: |
          # Plugin distribution mirrors source verbatim — no rename, no sed.
          mkdir -p plugins/rocky/skills/rocky-compress
          cp skills/rocky-compress/SKILL.md plugins/rocky/skills/rocky-compress/SKILL.md
          rm -rf plugins/rocky/skills/rocky-compress/scripts
          cp -r skills/rocky-compress/scripts plugins/rocky/skills/rocky-compress/scripts
          rm -rf plugins/rocky/skills/rocky-compress/scripts/__pycache__

      - name: Sync rockycrew skill + agents to plugin
        run: |
          mkdir -p plugins/rocky/skills/rockycrew plugins/rocky/agents
          cp skills/rockycrew/SKILL.md plugins/rocky/skills/rockycrew/SKILL.md
          cp agents/rockycrew-investigator.md plugins/rocky/agents/rockycrew-investigator.md
          cp agents/rockycrew-builder.md plugins/rocky/agents/rockycrew-builder.md
          cp agents/rockycrew-reviewer.md plugins/rocky/agents/rockycrew-reviewer.md

      - name: Rebuild rocky.skill ZIP
        run: mkdir -p dist && cd skills && zip -r ../dist/rocky.skill rocky/

      - name: Commit and push if changed
        run: |
          git add \
            skills/rocky-compress/ \
            plugins/rocky/skills/rocky-compress/ \
            plugins/rocky/skills/rocky/SKILL.md \
            plugins/rocky/skills/rockycrew/SKILL.md \
            plugins/rocky/agents/rockycrew-investigator.md \
            plugins/rocky/agents/rockycrew-builder.md \
            plugins/rocky/agents/rockycrew-reviewer.md \
            dist/rocky.skill
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies [skip ci]"
          git push
